repos:
  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        args: [Module2/secure-auth-service]
        always_run: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        args: [--fix, Module2/secure-auth-service]
        always_run: true

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd Module2/secure-auth-service && venv/bin/python -m mypy app/'
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: bash -c 'cd Module2/secure-auth-service && venv/bin/python -m pytest tests/ -v --tb=short'
        language: system
        pass_filenames: false
        always_run: true
